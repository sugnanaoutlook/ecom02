name: CI Pipeline - Test, Build & Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests
        run: mvn test

      - name: Publish JUnit test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/**/*.xml
          check_name: JUnit Test Results
          comment_title: Test Results
          fail_on: test failures
          comment_mode: always

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn package -DskipTests

      - name: Stage JAR for publish job
        uses: actions/upload-artifact@v4
        with:
          name: jar-staging
          path: target/*.jar
          retention-days: 1
          compression-level: 0
          if-no-files-found: error

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Maven verify
        run: mvn verify -DskipTests

      - name: Upload verify reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-reports
          path: target/site/
          retention-days: 7

  publish-artifact:
    name: Publish JAR Artifact
    runs-on: ubuntu-latest
    needs: [ build, code-quality ]

    steps:
      - name: Download staged JAR
        uses: actions/download-artifact@v4
        with:
          name: jar-staging
          path: artifacts/

      - name: Inspect JAR
        run: |
          echo "=== Spring Boot JAR details ==="
          ls -lh artifacts/
          JAR_FILE=$(ls artifacts/*.jar)
          JAR_NAME=$(basename "$JAR_FILE")
          JAR_SIZE=$(du -sh "$JAR_FILE" | cut -f1)
          echo "File : $JAR_NAME"
          echo "Size : $JAR_SIZE"
          echo "SHA256: $(sha256sum "$JAR_FILE" | cut -d' ' -f1)"
          echo "JAR_NAME=$JAR_NAME" >> $GITHUB_ENV

      - name: Upload Spring Boot JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.JAR_NAME }}-build-${{ github.run_number }}
          path: artifacts/*.jar
          retention-days: 7
          compression-level: 0
          if-no-files-found: error
